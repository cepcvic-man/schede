<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indice Schede CEPC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1A3A5C;--blue:#2E6DA4;--paper:#f0f0ee;--line:#d9d9d4;--soft:#F7F7F5;--ink:#243447;--muted:#6f7c86;--warn:#E8A900}
body{font-family:'Barlow',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.shell{min-height:100vh;display:flex;flex-direction:column}
.hero{background:linear-gradient(135deg,var(--navy),#244d73 60%,var(--blue));color:#fff;padding:22px 24px 24px;border-bottom:5px solid var(--warn)}
.hero-inner{max-width:1180px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.hero-title{display:flex;align-items:center;gap:12px}
.menu-toggle{display:none;width:39px;height:39px;border:1px solid rgba(255,255,255,.32);background:rgba(255,255,255,.13);color:#fff;border-radius:7px;padding:0;cursor:pointer;transition:background .16s ease,transform .16s ease}
.menu-toggle:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
.menu-toggle svg,.icon-button svg{width:17px;height:17px;display:block;fill:currentColor}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:5px}
h1{font-family:'Barlow Condensed',sans-serif;font-size:34px;line-height:1;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.count-badge{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);border-radius:6px;padding:8px 12px;white-space:nowrap}
.workspace{width:min(1180px,100%);margin:0 auto;padding:18px 16px 28px;display:grid;grid-template-columns:330px minmax(0,1fr);gap:18px;align-items:start}
.index-panel{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);overflow:hidden;position:sticky;top:16px}
.panel-head{background:var(--navy);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.panel-head h2{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.panel-head span{font-size:11px;color:rgba(255,255,255,.65)}
.search{padding:12px 14px;background:var(--soft);border-bottom:1px solid var(--line)}
.search input{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 10px;font:500 13px 'Barlow',sans-serif;color:var(--ink);outline:none;background:#fff}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,109,164,.14)}
.sheet-list{list-style:none;max-height:calc(100vh - 210px);overflow:auto}
.sheet-button{width:100%;border:0;background:#fff;border-bottom:1px solid #ededeb;padding:11px 14px;display:grid;grid-template-columns:38px 1fr;gap:10px;text-align:left;cursor:pointer;transition:background .16s ease,color .16s ease,transform .16s ease}
.sheet-button:hover{background:#F0F4F8}
.sheet-button.active{background:#EAF2F9;color:var(--navy);box-shadow:inset 5px 0 0 var(--blue)}
.sheet-button:focus-visible{outline:3px solid rgba(46,109,164,.35);outline-offset:-3px}
.sheet-number{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--navy);border-radius:5px;padding:4px 0;text-align:center;line-height:1;align-self:start}
    .sheet-title{
      font-family:'Barlow Condensed',sans-serif;
      font-size:15px;
      font-weight:700;
      letter-spacing:.035em;
      line-height:1.08;
      color:var(--navy);
      text-transform:uppercase
    }
.sheet-button.active .sheet-number{background:var(--blue);color:#fff}
.sheet-button.active .sheet-title{color:var(--navy)}
.viewer-panel{min-width:0}
.viewer-toolbar{background:#fff;border-radius:10px 10px 0 0;box-shadow:0 2px 12px rgba(0,0,0,.12);border-bottom:1px solid var(--line);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.viewer-title{min-width:0}
.viewer-kicker{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:2px}
.viewer-title h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;line-height:1.05;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-button{width:40px;height:38px;border:0;color:#fff;background:var(--blue);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;white-space:nowrap;transition:background .16s ease,transform .16s ease}
.icon-button:hover{background:var(--navy);transform:translateY(-1px)}
.icon-button:focus-visible,.menu-toggle:focus-visible{outline:3px solid rgba(232,169,0,.38);outline-offset:2px}
.frame-wrap{background:#fff;border-radius:0 0 10px 10px;box-shadow:0 2px 12px rgba(0,0,0,.12);padding:14px;min-height:520px}
iframe{width:100%;height:760px;border:0;background:var(--paper);border-radius:8px;display:block;overflow:hidden}
.backdrop{display:none}
.empty{display:none;padding:16px;color:var(--muted);font-size:13px}
.sheet-list.no-results + .empty{display:block}
@media(max-width:1100px){
  .hero{padding:18px 16px}
  .hero-inner{align-items:center;flex-direction:row;gap:12px}
  .hero-title{min-width:0}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  h1{font-size:29px}
  .workspace{grid-template-columns:1fr;padding:14px 12px 22px}
  .index-panel{position:fixed;z-index:40;top:0;bottom:0;left:0;width:min(360px,88vw);border-radius:0;transform:translateX(-105%);transition:transform .22s ease;box-shadow:8px 0 24px rgba(0,0,0,.22);visibility:hidden;pointer-events:none}
  body.menu-open .index-panel{transform:translateX(0);visibility:visible;pointer-events:auto}
  .backdrop{display:block;position:fixed;inset:0;background:rgba(14,31,48,.42);z-index:30;opacity:0;pointer-events:none;transition:opacity .2s ease}
  body.menu-open .backdrop{opacity:1;pointer-events:auto}
  .sheet-list{max-height:calc(100vh - 112px)}
  .sheet-button{grid-template-columns:38px 1fr}
  .viewer-title h2{font-size:20px}
}
@media(max-width:560px){
  .count-badge{font-size:13px}
  .hero-inner{align-items:flex-start}
  .hero-title{align-items:flex-start}
  h1{font-size:25px}
  .viewer-toolbar{align-items:flex-start;flex-direction:column}
  .icon-button{width:100%}
  .frame-wrap{padding:8px}
}
@media(prefers-reduced-motion:no-preference){
  .hero{animation:heroIn .35s ease both}
  .viewer-panel{animation:rise .32s ease .06s both}
  @keyframes heroIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
}
@media print{
  body.printing-sheet{background:#fff!important}
  body.printing-sheet .hero,
  body.printing-sheet .backdrop,
  body.printing-sheet .index-panel,
  body.printing-sheet .viewer-toolbar{display:none!important}
  body.printing-sheet .shell,
  body.printing-sheet .workspace,
  body.printing-sheet .viewer-panel,
  body.printing-sheet .frame-wrap{display:block!important;width:100%!important;max-width:none!important;margin:0!important;padding:0!important;box-shadow:none!important;border:0!important;background:#fff!important;min-height:0!important}
  body.printing-sheet iframe{display:block!important;width:100%!important;height:var(--print-frame-height, 2000px)!important;border:0!important;border-radius:0!important;overflow:visible!important;background:#fff!important}
}
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-title">
        <button class="menu-toggle" id="menu-toggle" type="button" aria-controls="sheet-index" aria-expanded="false" aria-label="Apri indice" title="Apri indice">
          <svg viewBox="0 0 448 512" aria-hidden="true" focusable="false">
            <path d="M0 88c0-13.3 10.7-24 24-24h400c13.3 0 24 10.7 24 24s-10.7 24-24 24H24C10.7 112 0 101.3 0 88zm0 160c0-13.3 10.7-24 24-24h400c13.3 0 24 10.7 24 24s-10.7 24-24 24H24c-13.3 0-24-10.7-24-24zm448 160c0 13.3-10.7 24-24 24H24c-13.3 0-24-10.7-24-24s10.7-24 24-24h400c13.3 0 24 10.7 24 24z"/>
          </svg>
        </button>
        <div>
          <div class="eyebrow">CEPC · Archivio operativo</div>
          <h1>Indice Schede</h1>
        </div>
      </div>
      <div class="count-badge"><span id="sheet-count">23</span> schede</div>
    </div>
  </header>

  <div class="backdrop" id="backdrop"></div>

  <main class="workspace">
    <aside class="index-panel" id="sheet-index" aria-label="Indice schede">
      <div class="panel-head">
        <h2>Elenco Schede</h2>
        <span>Numero e titolo</span>
      </div>
      <div class="search">
        <input id="search" type="search" placeholder="Cerca scheda o titolo..." autocomplete="off">
      </div>
      <ul class="sheet-list" id="sheet-list"></ul>
      <div class="empty" id="empty">Nessuna scheda trovata.</div>
    </aside>

    <section class="viewer-panel" aria-label="Anteprima scheda selezionata">
      <div class="viewer-toolbar">
        <div class="viewer-title">
          <div class="viewer-kicker" id="viewer-kicker">Scheda 1</div>
          <h2 id="viewer-heading">Stendibiancheria</h2>
        </div>
        <button class="icon-button" id="print-button" type="button" aria-label="Stampa file" title="Stampa file">
          <svg viewBox="0 0 512 512" aria-hidden="true" focusable="false">
            <path d="M128 0h256c17.7 0 32 14.3 32 32v96H96V32c0-17.7 14.3-32 32-32zM64 160h384c35.3 0 64 28.7 64 64v112c0 17.7-14.3 32-32 32h-64v112c0 17.7-14.3 32-32 32H128c-17.7 0-32-14.3-32-32V368H32c-17.7 0-32-14.3-32-32V224c0-35.3 28.7-64 64-64zm80 192v112h224V352H144zm288-104a24 24 0 1 0-48 0 24 24 0 0 0 48 0z"/>
          </svg>
        </button>
      </div>
      <div class="frame-wrap">
        <iframe id="viewer" title="Scheda selezionata" src="scheda1.html" scrolling="no"></iframe>
      </div>
    </section>
  </main>
</div>

<script>
const sheets = [
  {number:1,title:'Stendibiancheria',file:'scheda1.html'},
  {number:3,title:'Deragnatore',file:'scheda3.html'},
  {number:4,title:'Carrello Portasacchi',file:'scheda4.html'},
  {number:5,title:'Carrello a Due Secchi',file:'scheda5.html'},
  {number:6,title:'Nebulizzatore Manuale',file:'scheda6.html'},
  {number:7,title:'Pinza per Mocio',file:'scheda7.html'},
  {number:8,title:'Manici Scope e Mop',file:'scheda8.html'},
  {number:9,title:'Manici per Palette',file:'scheda9.html'},
  {number:10,title:'Pinza Raccolta Carta',file:'scheda10.html'},
  {number:11,title:'Mop Bianchi e Blu',file:'scheda11.html'},
  {number:12,title:'Scopa a Frange',file:'scheda12.html'},
  {number:13,title:'Telaio per Mop',file:'scheda13.html'},
  {number:14,title:'Scope di Saggina',file:'scheda14.html'},
  {number:15,title:'Scope',file:'scheda15.html'},
  {number:16,title:'Secchi Misti',file:'scheda16.html'},
  {number:17,title:'Tira Acqua',file:'scheda17.html'},
  {number:18,title:'Porta Rotolone da Terra',file:'scheda18.html'},
  {number:19,title:'Panni in Microfibra',file:'scheda19.html'},
  {number:20,title:'Cestini Bagno',file:'scheda20.html'},
  {number:21,title:'Cestini Uffici',file:'scheda21.html'},
  {number:22,title:'Bidoni per Esterno',file:'scheda22.html'},
  {number:23,title:'Vello',file:'scheda23.html'},
  {number:24,title:'Tergivetro',file:'scheda24.html'}
];

const list = document.getElementById('sheet-list');
const search = document.getElementById('search');
const viewer = document.getElementById('viewer');
const heading = document.getElementById('viewer-heading');
const kicker = document.getElementById('viewer-kicker');
const printButton = document.getElementById('print-button');
const count = document.getElementById('sheet-count');
const menuToggle = document.getElementById('menu-toggle');
const backdrop = document.getElementById('backdrop');
let activeNumber = sheets[0].number;

count.textContent = sheets.length;

function renderList(filter = '') {
  const query = filter.trim().toLowerCase();
  const visible = sheets.filter(sheet => {
    return String(sheet.number).includes(query) || sheet.title.toLowerCase().includes(query);
  });

  list.innerHTML = visible.map(sheet => `
    <li>
      <button class="sheet-button ${sheet.number === activeNumber ? 'active' : ''}" type="button" data-number="${sheet.number}">
        <span class="sheet-number">${sheet.number}</span>
        <span class="sheet-title">${sheet.title}</span>
      </button>
    </li>
  `).join('');

  list.classList.toggle('no-results', visible.length === 0);
}

function selectSheet(number) {
  const sheet = sheets.find(item => item.number === number);
  if (!sheet) return;

  activeNumber = sheet.number;
  viewer.src = sheet.file;
  heading.textContent = sheet.title;
  kicker.textContent = `Scheda ${sheet.number}`;
  renderList(search.value);
  closeMenu();
}

function printCurrentSheet() {
  try {
    resizeViewer();
    document.documentElement.style.setProperty('--print-frame-height', viewer.style.height || `${viewer.offsetHeight}px`);
    document.body.classList.add('printing-sheet');
    window.print();
  } catch (error) {
    console.error('Impossibile stampare la scheda selezionata.', error);
  }
}

window.addEventListener('afterprint', () => {
  document.body.classList.remove('printing-sheet');
});

window.addEventListener('focus', () => {
  if (document.body.classList.contains('printing-sheet')) {
    setTimeout(() => document.body.classList.remove('printing-sheet'), 250);
  }
});

list.addEventListener('click', event => {
  const button = event.target.closest('.sheet-button');
  if (!button) return;
  selectSheet(Number(button.dataset.number));
});

search.addEventListener('input', event => renderList(event.target.value));

function openMenu() {
  document.body.classList.add('menu-open');
  menuToggle.setAttribute('aria-expanded', 'true');
}

function closeMenu() {
  document.body.classList.remove('menu-open');
  menuToggle.setAttribute('aria-expanded', 'false');
}

menuToggle.addEventListener('click', () => {
  document.body.classList.contains('menu-open') ? closeMenu() : openMenu();
});

backdrop.addEventListener('click', closeMenu);

printButton.addEventListener('click', printCurrentSheet);

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeMenu();
});

let frameObserver;

function resizeViewer() {
  try {
    const doc = viewer.contentDocument || viewer.contentWindow.document;
    doc.documentElement.style.overflow = 'hidden';
    doc.body.style.overflow = 'hidden';
    const height = Math.max(
      680,
      doc.documentElement.scrollHeight,
      doc.body.scrollHeight,
      doc.documentElement.offsetHeight,
      doc.body.offsetHeight
    ) + 48;
    viewer.style.height = `${height}px`;
  } catch (error) {
    viewer.style.height = '1800px';
  }
}

viewer.addEventListener('load', () => {
  if (frameObserver) frameObserver.disconnect();

  resizeViewer();

  try {
    const doc = viewer.contentDocument || viewer.contentWindow.document;
    const scheduleResize = () => requestAnimationFrame(resizeViewer);

    frameObserver = new ResizeObserver(scheduleResize);
    frameObserver.observe(doc.documentElement);
    frameObserver.observe(doc.body);

    doc.querySelectorAll('img').forEach(image => {
      if (!image.complete) image.addEventListener('load', scheduleResize, {once:true});
    });
  } catch (error) {
    // Cross-origin/file restrictions: fallback handled by resizeViewer.
  }

  [120, 350, 800, 1500, 3000].forEach(delay => setTimeout(resizeViewer, delay));
});

renderList();
</script>
</body>
</html>
